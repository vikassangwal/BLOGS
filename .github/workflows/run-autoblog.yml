name: Auto-Blog Scheduled Runner

on:
  schedule:
    # Runs every 30 minutes. You can adjust this schedule.
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to manually click "Run workflow" in GitHub Actions tab

jobs:
  run-autoblog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Start Next.js Local Server
        run: |
          npm run dev &
          echo "Waiting for local server to start..."
          sleep 10
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: 3000

      - name: Trigger Auto-Blog API
        run: |
          curl -X POST "http://localhost:3000/api/auto-blog?secret=knowora-cron-2026" \
            -H "x-force-run: true" \
            -H "x-cron-secret: knowora-cron-2026"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
